openapi: 3.1.0
info:
  title: Grafana Cloud k6
  version: 1.12.0
  description: HTTP API for interacting with Grafana Cloud k6.
  contact:
    name: Grafana Support
    url: https://grafana.com/help/
    email: info@grafana.com
servers:
- url: https://api.k6.io
  description: Global k6 Cloud API.
tags:
- name: authorization
  description: API endpoints for validating tokens.
- name: labels
  description: API endpoints for managing labels.
- name: load_tests
  description: API endpoints for managing and starting tests.
- name: load_zones
  description: API endpoints for managing load zones.
- name: projects
  description: API endpoints for managing projects.
- name: schedules
  description: API endpoints for managing test schedules.
- name: test_runs
  description: API endpoints for managing test runs.
paths:
  /provisioning/v1/load_tests/{id}/start_local_execution:
    post:
      operationId: start_local_execution_test
      description: Start a test in local execution mode.
      summary: Start a test in local execution mode.
      parameters:
      - in: header
        name: K6-Idempotency-Key
        schema:
          type: string
          maxLength: 36
          minLength: 1
        description: Idempotency key to prevent duplicate test starts when retrying requests. The key is valid for 10 minutes.
      - in: path
        name: id
        schema:
          type: integer
          format: int64
        description: ID of the load test.
        required: true
      tags:
      - provisioning
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartLocalExecutionTestRequest'
            examples:
              Start:
                value:
                  options:
                    vus: 10
                    duration: 10m
                  max_vus: 10
                  total_duration: 630
                  instances: null
                  archive_size: 1000
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartLocalExecutionTestResponse'
              examples:
                Started:
                  value:
                    test_run_id: 1234
                    archive_upload_url: https://example.com/archive.tar
                    runtime_config:
                      metrics:
                        push_url: https://example.com/metrics
                        push_interval: 1s
                        push_concurrency: 10
                        aggregation_period: 1s
                        aggregation_wait_period: 1s
                        aggregation_min_samples: 10
                        max_samples_per_package: 1000
                      traces:
                        push_url: https://example.com/traces
                        traces_metadata: {}
                        proto: http
                      files:
                        push_url: https://example.com/files
                        screenshots_base_path: /screenshots
                        headers: {}
                        method: POST
                      logs:
                        push_url: https://example.com/logs
                        tail_url: https://example.com/logs/tail
                        limit: 900
                        push_period_seconds: 3s
                        level: info
                        message_max_size: 10000
                        allowed_labels:
                        - lz
                        - level
                        - test_run_id
                        - instance_id
                        - source
                      secrets:
                        endpoint: https://api.k6.io/provisioning/v1/test_runs/1234/decrypt_secret?name={key}
                        response_path: plaintext
                      test_run_token: test_run_token
                    test_run_details_page_url: https://example.com/test_run_details
          description: OK.
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /provisioning/v1/test_runs/{id}/notify:
    post:
      operationId: test_runs_notify
      description: Report a test run lifecycle event.
      summary: Report a test run lifecycle event.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
          format: int64
        description: ID of the test run.
        required: true
      tags:
      - provisioning
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScriptExecutionCompletedNotificationApiModel'
            examples:
              ScriptExecutionCompleted:
                value:
                  event_type: script_execution_completed
                  error: null
              ScriptExecutionCompletedWithError:
                value:
                  event_type: script_execution_completed
                  error:
                    code: 8030
                    reason: 'An error occurred during setup() execution: TypeError: Cannot read property ''x'' of undefined'
        required: true
      responses:
        '204':
          description: OK.
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /provisioning/v1/test_runs/{test_run_id}/aisdk_session:
    get:
      operationId: test_runs_aisdk_session_retrieve
      description: |-
        Mint an ai-sdk access token for the authenticated test run's stack.

        The test run id is part of the path so the ``testrun_authenticate``
        middleware can validate the request and inject the ``X-Stack-Id``,
        ``X-Cluster-Slug``, and ``X-K6-Org-Id`` headers; the id itself is not
        used by the mint.
      summary: Mint an ai-sdk access token for a test run.
      parameters:
      - in: path
        name: test_run_id
        schema:
          type: integer
          format: int64
        description: ID of the test run.
        required: true
      tags:
      - provisioning
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AisdkSessionApiModel'
              examples:
                OK:
                  value:
                    access_token: eyJ...
                    expires_at: '2026-05-18T16:00:00Z'
                    base_url: https://assistant-dev-us-east-0.grafana-dev.net/assistant/api/v1/aisdk
                    namespace: stacks-12345
          description: OK.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UnexpectedError'
        '502':
          description: Auth API backend error.
  /provisioning/v1/test_runs/{test_run_id}/decrypt_secret:
    get:
      operationId: test_runs_decrypt_secret_retrieve
      description: |-
        Decrypt the indicated test.

        Note that the test run is not used directly in this endpoint. It's included in the path
        so the "test run based authentication" can happen, but after that, if we actually get
        to the code here, all we need is the organization related information.
      summary: Decrypt a secret for a test run.
      parameters:
      - in: query
        name: name
        schema:
          type: string
        description: The name of the secret to decrypt.
        required: true
      - in: path
        name: test_run_id
        schema:
          type: integer
          format: int64
        description: ID of the test run.
        required: true
      tags:
      - provisioning
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecryptedApiModel'
              examples:
                OK:
                  value:
                    plaintext: 42abc
          description: OK.
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /cloud/v6/auth:
    get:
      operationId: auth
      description: Validate a Grafana Cloud k6 Personal API token or Stack API token and access to the stack.
      summary: Validate a Grafana Cloud k6 API token and access to the stack.
      parameters:
      - in: header
        name: X-Stack-Url
        schema:
          type: string
        description: The URL of the Grafana stack to authenticate to.
        required: true
      tags:
      - authorization
      security:
      - k6ApiToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationResponse'
              examples:
                OK:
                  value:
                    stack_id: 12345
                    default_project_id: 67890
          description: OK.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /cloud/v6/labels:
    get:
      operationId: labels_list
      description: List all label keys (accessible by all authenticated users).
      summary: List label keys.
      tags:
      - labels
      security:
      - k6ApiToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelKeyListResponse'
              examples:
                OK:
                  value:
                    value:
                    - id: 1
                      key: environment
                      description: Environment being tested
                    - id: 2
                      key: team
                      description: Team responsible for the project
          description: OK.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '500':
          $ref: '#/components/responses/UnexpectedError'
      parameters:
      - $ref: '#/components/parameters/stackId'
    post:
      operationId: labels_create
      description: |-
        Creates one or more label keys for the organization.

        This operation is additive: it adds the new labels to the existing ones
        without replacing them.
      summary: Create label keys.
      tags:
      - labels
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LabelKeyCreateRequest'
            examples:
              Create:
                value:
                  value:
                  - key: environment
                    description: Environment being tested
                  - key: team
                    description: Team responsible for the project
                  - key: cost_center
        required: true
      security:
      - k6ApiToken: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelKeyListResponse'
              examples:
                Created:
                  value:
                    value:
                    - id: 1
                      key: environment
                      description: Environment being tested
                    - id: 2
                      key: team
                      description: Team responsible for the project
                    - id: 3
                      key: cost_center
                      description: null
          description: OK.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseApiModel'
          description: Duplicate keys in request.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseApiModel'
          description: Maximum number of label keys (100) exceeded.
        '500':
          $ref: '#/components/responses/UnexpectedError'
      parameters:
      - $ref: '#/components/parameters/stackId'
  /cloud/v6/labels/{id}:
    patch:
      operationId: labels_partial_update
      description: Update a label key (rename or update description) (Admin only).
      summary: Update a label key.
      parameters:
      - $ref: '#/components/parameters/stackId'
      - in: path
        name: id
        schema:
          type: integer
          format: int64
        description: ID of the label key.
        required: true
      tags:
      - labels
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LabelKeyPatchRequest'
            examples:
              RenameKey:
                value:
                  key: env
                summary: Rename key
              UpdateDescription:
                value:
                  description: Environment (dev, prod)
                summary: Update description
              UpdateBoth:
                value:
                  key: env
                  description: Environment (dev, prod)
                summary: Update both
      security:
      - k6ApiToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelKeyResponse'
              examples:
                OK:
                  value:
                    id: 1
                    key: env
                    description: Environment (dev, prod)
          description: OK.
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseApiModel'
          description: Label key not found.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseApiModel'
          description: Label key with new name already exists.
        '500':
          $ref: '#/components/responses/UnexpectedError'
    delete:
      operationId: labels_destroy
      description: |-
        Delete a label key (Admin only).

        When a label key is deleted, all project labels using this key
        are cascade deleted.
      summary: Delete a label key.
      parameters:
      - $ref: '#/components/parameters/stackId'
      - in: path
        name: id
        schema:
          type: integer
          format: int64
        description: ID of the label key.
        required: true
      tags:
      - labels
      security:
      - k6ApiToken: []
      responses:
        '204':
          description: OK.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseApiModel'
          description: Label key not found.
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /cloud/v6/load_tests:
    get:
      operationId: load_tests_list
      description: List all available tests.
      summary: List all tests.
      parameters:
      - $ref: '#/components/parameters/stackId'
      - in: query
        name: $count
        schema:
          type: boolean
        description: Include collection length in the response object as `@count`.
      - in: query
        name: $orderby
        schema:
          type: string
        description: |-
          Comma-separated list of fields to use when ordering the results. Available fields:
          - id
          - project_id
          - name
          - created
          - updated

          The default ascending order can be reversed by appending the `desc` specifier.
        examples:
          Multiple:
            value: id desc,project_id
      - in: query
        name: $skip
        schema:
          type: integer
        description: The initial index from which to return the results.
      - in: query
        name: $top
        schema:
          type: integer
          default: 1000
          maximum: 1000
        description: Number of results to return per page.
      - in: query
        name: name
        schema:
          type: string
        description: Filter results by load test name (exact match).
      tags:
      - load_tests
      security:
      - k6ApiToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoadTestListResponse'
              examples:
                OK:
                  value:
                    value:
                    - id: 1234
                      project_id: 312
                      name: Orders API Soak Test
                      baseline_test_run_id: null
                      k6_version: null
                      created: '2024-12-03T09:53:00.553'
                      updated: '2024-12-03T09:53:00.553'
                    '@count': 123
                    '@nextLink': https://api.k6.io/cloud/v6/load_tests?$skip=50&$top=20
          description: OK.
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /cloud/v6/load_tests/{id}/schedule:
    get:
      operationId: load_tests_schedule_retrieve
      description: Get the load test schedule.
      summary: Get the load test schedule.
      parameters:
      - $ref: '#/components/parameters/stackId'
      - in: path
        name: id
        schema:
          type: integer
          format: int64
        description: ID of the load test.
        required: true
      tags:
      - schedules
      security:
      - k6ApiToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleApiModel'
              examples:
                Hourly:
                  value:
                    id: 123
                    load_test_id: 234
                    deactivated: false
                    starts: '2024-07-16T08:46:04.021Z'
                    recurrence_rule: null
                    cron:
                      schedule: 0 0 * * *
                      time_zone: UTC
                    next_run: '2024-07-17T00:00:00Z'
                    created_by: user@example.com
                7amOnMonday:
                  value:
                    id: 123
                    load_test_id: 234
                    deactivated: false
                    starts: '2024-07-16T08:46:04.021Z'
                    recurrence_rule: null
                    cron:
                      schedule: 0 7 * * 1
                      time_zone: UTC
                    next_run: '2024-07-22T07:00:00Z'
                    created_by: user@example.com
                EveryTwoHours:
                  value:
                    id: 123
                    load_test_id: 234
                    deactivated: false
                    starts: '2024-07-16T08:46:04.021Z'
                    recurrence_rule:
                      frequency: HOURLY
                      interval: 2
                      byday: null
                      until: null
                      count: null
                    cron: null
                    next_run: '2024-07-20T01:46:04.021Z'
                    created_by: user@example.com
                WeeklyOnWeekendsStopsAfter10Runs:
                  value:
                    id: 123
                    load_test_id: 234
                    deactivated: false
                    starts: '2024-07-16T08:46:04.021Z'
                    recurrence_rule:
                      frequency: WEEKLY
                      interval: 1
                      byday:
                      - SA
                      - SU
                      until: null
                      count: 10
                    cron: null
                    next_run: '2024-07-17T08:46:04.021Z'
                    created_by: null
                TriggeredOnceInThePast:
                  value:
                    id: 123
                    load_test_id: 234
                    deactivated: false
                    starts: '2023-08-01T12:00:00.000Z'
                    recurrence_rule: null
                    cron: null
                    next_run: null
                    created_by: user@example.com
                Deactivated:
                  value:
                    id: 123
                    load_test_id: 234
                    deactivated: true
                    starts: '2024-07-16T08:46:04.021Z'
                    recurrence_rule:
                      frequency: HOURLY
                      interval: 2
                      days: []
                      ends: null
                    cron: null
                    next_run: '2024-07-20T01:46:04.021Z'
                    created_by: user@example.com
          description: OK.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UnexpectedError'
    post:
      operationId: load_tests_schedule_create
      description: |-
        Set a schedule for the load test.

        This operation overwrites any existing test schedule.

        Monthly schedules running on days 29-31 are adjusted to run on the last day of the month
        if the target day doesn't exist in a given month (for example, March 31 -> April 30).
      summary: Set a schedule for the load test.
      parameters:
      - $ref: '#/components/parameters/stackId'
      - in: path
        name: id
        schema:
          type: integer
          format: int64
        description: ID of the load test.
        required: true
      tags:
      - schedules
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduleRequest'
            examples:
              EveryTwoHours:
                value:
                  starts: '2024-07-16T08:46:04.021Z'
                  recurrence_rule:
                    frequency: HOURLY
                    interval: 2
              WeeklyOnWeekendsStopsAfter10Runs:
                value:
                  starts: '2024-07-16T08:46:04.021Z'
                  recurrence_rule:
                    frequency: WEEKLY
                    byday:
                    - SA
                    - SU
                    count: 10
              TriggeredOnce:
                value:
                  starts: '2028-08-01T12:00:00.000Z'
                  recurrence_rule: null
        required: true
      security:
      - k6ApiToken: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleApiModel'
              examples:
                Hourly:
                  value:
                    id: 123
                    load_test_id: 234
                    deactivated: false
                    starts: '2024-07-16T08:46:04.021Z'
                    recurrence_rule: null
                    cron:
                      schedule: 0 0 * * *
                      time_zone: UTC
                    next_run: '2024-07-17T00:00:00Z'
                    created_by: user@example.com
                7amOnMonday:
                  value:
                    id: 123
                    load_test_id: 234
                    deactivated: false
                    starts: '2024-07-16T08:46:04.021Z'
                    recurrence_rule: null
                    cron:
                      schedule: 0 7 * * 1
                      time_zone: UTC
                    next_run: '2024-07-22T07:00:00Z'
                    created_by: user@example.com
                EveryTwoHours:
                  value:
                    id: 123
                    load_test_id: 234
                    deactivated: false
                    starts: '2024-07-16T08:46:04.021Z'
                    recurrence_rule:
                      frequency: HOURLY
                      interval: 2
                      byday: null
                      until: null
                      count: null
                    cron: null
                    next_run: '2024-07-20T01:46:04.021Z'
                    created_by: user@example.com
                WeeklyOnWeekendsStopsAfter10Runs:
                  value:
                    id: 123
                    load_test_id: 234
                    deactivated: false
                    starts: '2024-07-16T08:46:04.021Z'
                    recurrence_rule:
                      frequency: WEEKLY
                      interval: 1
                      byday:
                      - SA
                      - SU
                      until: null
                      count: 10
                    cron: null
                    next_run: '2024-07-17T08:46:04.021Z'
                    created_by: null
                TriggeredOnceInThePast:
                  value:
                    id: 123
                    load_test_id: 234
                    deactivated: false
                    starts: '2023-08-01T12:00:00.000Z'
                    recurrence_rule: null
                    cron: null
                    next_run: null
                    created_by: user@example.com
                Deactivated:
                  value:
                    id: 123
                    load_test_id: 234
                    deactivated: true
                    starts: '2024-07-16T08:46:04.021Z'
                    recurrence_rule:
                      frequency: HOURLY
                      interval: 2
                      days: []
                      ends: null
                    cron: null
                    next_run: '2024-07-20T01:46:04.021Z'
                    created_by: user@example.com
          description: OK.
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PermissionDenied'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /cloud/v6/load_tests/{id}/test_runs:
    get:
      operationId: load_tests_test_runs_retrieve
      description: List all runs of a load test.
      summary: List all runs of a load test.
      parameters:
      - $ref: '#/components/parameters/stackId'
      - in: query
        name: $count
        schema:
          type: boolean
        description: Include collection length in the response object as `@count`.
      - in: query
        name: $orderby
        schema:
          type: string
        description: |-
          Comma-separated list of fields to use when ordering the results. Available fields:
          - created

          The default ascending order can be reversed by appending the `desc` specifier.
        examples:
          Simple:
            value: created desc
      - in: query
        name: $skip
        schema:
          type: integer
        description: The initial index from which to return the results.
      - in: query
        name: $top
        schema:
          type: integer
          default: 1000
          maximum: 1000
        description: Number of results to return per page.
      - in: query
        name: created_after
        schema:
          type: string
          format: date-time
          minLength: 1
        description: Filter test runs created on or after this date and time (inclusive).
        examples:
          UTC:
            value: '2025-08-01T12:00:00+00:00'
      - in: query
        name: created_before
        schema:
          type: string
          format: date-time
          minLength: 1
        description: Filter test runs created before this date and time (non-inclusive).
        examples:
          UTC:
            value: '2025-08-31T12:00:00+00:00'
      - in: path
        name: id
        schema:
          type: integer
          format: int64
        description: ID of the load test.
