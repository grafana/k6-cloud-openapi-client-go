components:
  schemas:
    AisdkSessionApiModel:
      description: Model for the response of the ai-sdk session endpoint.
      properties:
        access_token:
          description: Short-lived access token (TTL matches the agentic test cap).
          title: Access Token
          type: string
        expires_at:
          description: ISO 8601 timestamp when the access token expires (UTC).
          format: date-time
          title: Expires At
          type: string
        base_url:
          description: Region-matched URL of the hosted ai-sdk endpoint.
          title: Base Url
          type: string
        namespace:
          description: Stack-scoped namespace claim on the access token (e.g. 'stacks-12345').
          title: Namespace
          type: string
      required:
      - access_token
      - expires_at
      - base_url
      - namespace
      title: AisdkSession
      type: object
    DecryptedApiModel:
      description: Model for the response of the secrets decryption endpoint.
      properties:
        plaintext:
          description: The decrypted secret.
          title: Plaintext
          type: string
      required:
      - plaintext
      title: Decrypted
      type: object
    ErrorApiModel:
      description: Details of the error.
      properties:
        message:
          description: Human-readable string describing the error.
          title: Message
          type: string
        code:
          description: Service-defined error code.
          title: Code
          type: string
        target:
          default: null
          description: A string indicating the target of the error. For example, the name of the property in error.
          title: Target
          type:
          - string
          - 'null'
        details:
          default: null
          description: Array of objects with more specific error information when applicable.
          items:
            $ref: '#/components/schemas/ErrorDetailsApiModel'
          title: Details
          type:
          - array
          - 'null'
      required:
      - message
      - code
      title: Error
      type: object
    ErrorDetailsApiModel:
      properties:
        message:
          description: Human-readable string describing the error.
          title: Message
          type: string
        code:
          description: Service-defined error code.
          title: Code
          type: string
        target:
          default: null
          description: A string indicating the target of the error. For example, the name of the property in error.
          title: Target
          type:
          - string
          - 'null'
      required:
      - message
      - code
      title: ErrorDetails
      type: object
    ErrorResponseApiModel:
      properties:
        error:
          $ref: '#/components/schemas/ErrorApiModel'
      required:
      - error
      title: ErrorResponse
      type: object
    FilesRuntimeConfig:
      description: Files upload runtime configuration.
      properties:
        push_url:
          description: URL to generate a pre-signed URLs for file uploads.
          title: Push Url
          type: string
        screenshots_base_path:
          description: Base path for screenshot uploads.
          title: Screenshots Base Path
          type: string
        headers:
          additionalProperties:
            type: string
          description: HTTP headers to include in requests.
          title: Headers
          type: object
        method:
          description: HTTP method to use for screenshot uploads.
          title: Method
          type: string
      required:
      - push_url
      - screenshots_base_path
      - headers
      - method
      title: FilesRuntimeConfig
      type: object
    LocalExecutionOptions:
      additionalProperties: true
      description: Parsed k6 script options.
      properties: {}
      title: LocalExecutionOptions
      type: object
    LogsRuntimeConfig:
      description: Logs push runtime configuration.
      properties:
        push_url:
          description: URL to push logs to.
          title: Push Url
          type: string
        tail_url:
          description: URL to tail logs from.
          title: Tail Url
          type: string
        limit:
          description: Maximum number of log lines to push per interval.
          title: Limit
