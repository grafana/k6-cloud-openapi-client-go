  securitySchemes:
    gcomToken:
      type: http
      scheme: bearer
      description: Token-based authentication using GCom API bearer token.
    k6ApiToken:
      type: http
      scheme: bearer
      description: Token-based authentication using k6 Personal API token or Grafana Stack API token.
    testRunToken:
      type: http
      scheme: bearer
      description: Token-based authentication using short-lived test run token.
  responses:
    ValidationError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseApiModel'
      description: Request validation error.
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseApiModel'
      description: Invalid token or authentication scheme.
    PermissionDenied:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseApiModel'
      description: The user does not have permission to perform this action.
    NotFound:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseApiModel'
      description: Resource not found.
    UnexpectedError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseApiModel'
      description: Unexpected error.
  parameters:
    stackId:
      in: header
      name: X-Stack-Id
      description: |-
        Numeric ID of the Grafana stack representing the request scope.
        - If the API is called with a *Personal API token*, the user must be a member of the specified stack.
        - If the API is called with a *Grafana Stack API token*, the value must be the ID of the corresponding stack.
      schema:
        type: integer
        format: int64
      required: true
